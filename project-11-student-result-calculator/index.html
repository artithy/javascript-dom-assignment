<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Student Result Calculator</h1>

        <input type="number" id="bangla" placeholder="Bangla Marks">
        <br><br>

        <input type="number" id="english" placeholder="English Marks">
        <br><br>

        <input type="number" id="math" placeholder="Math Marks">
        <br><br>

        <button id="calculateBtn">Calculate</button>

        <h2 id="result"></h2>

    </div>

    <script src="script.js"></script>

</body>

</html>
